server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/products/**

          filters:
            - JwtFilter

        - id: cart-service
          uri: lb://CART-SERVICE
          predicates:
            - Path=/cart/**

          filters:
            - JwtFilter

        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders/**

          filters:
            - JwtFilter

        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/payments/**

          filters:
            - JwtFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true
