server:
  port: 8086

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/auth/**
        - id: login-backend
          uri: http://login-backend:8087
          predicates:
            - Path=/user/**
        - id: product-service
          uri: http://product-service:8081
          predicates:
            - Path=/products/**
        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/orders/**
        - id: payment-service
          uri: http://payment-service:8084
          predicates:
            - Path=/payments/**